<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d68a"/>
      <stop offset="30%" stop-color="#d4af37"/>
      <stop offset="60%" stop-color="#b8952e"/>
      <stop offset="100%" stop-color="#8a6f1e"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fce8b0"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#a8892e"/>
    </linearGradient>
    <filter id="neGlow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="oGlow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#d4af37" flood-opacity="0.25"/>
    </filter>
  </defs>
  <g filter="url(#neGlow)">
    <text x="20" y="68" font-family="'Syne','Arial Black',sans-serif" font-weight="800" font-size="52" letter-spacing="8" fill="#ffffff">NE</text>
  </g>
  <g filter="url(#oGlow)">
    <!-- 3D layers for O -->
    <text x="120" y="72" font-family="'Syne','Arial Black',sans-serif" font-weight="800" font-size="56" letter-spacing="0" fill="url(#goldGrad)" opacity="0.2" transform="translate(4,3)">O</text>
    <text x="120" y="72" font-family="'Syne','Arial Black',sans-serif" font-weight="800" font-size="56" letter-spacing="0" fill="url(#goldGrad)" opacity="0.4" transform="translate(2,1)">O</text>
    <text x="120" y="72" font-family="'Syne','Arial Black',sans-serif" font-weight="800" font-size="56" letter-spacing="0" fill="url(#goldGrad2)">O</text>
    <!-- Shine highlight -->
    <text x="120" y="66" font-family="'Syne','Arial Black',sans-serif" font-weight="800" font-size="56" letter-spacing="0" fill="#fff" opacity="0.08">O</text>
  </g>
</svg>
